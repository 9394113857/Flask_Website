# ============================================================
# 🚀 FIRST DOCKER IMAGE BUILD & PUSH WORKFLOW
# ============================================================
#
# Purpose:
# - This workflow is manually triggered only.
# - Used for the FIRST Docker image push.
# - After this image exists on Docker Hub, Render can consume it.
#
# Flow:
#
# GitHub Actions (Manual Run)
#          |
#          |
#          v
# Docker Login
#          |
#          v
# Build Docker Image
#          |
#          v
# Push Image to Docker Hub
#
# ============================================================


name: 🚀 First Docker Image Push


# ============================================================
# Workflow Trigger
# ============================================================
#
# workflow_dispatch means:
# - This workflow will NOT run automatically.
# - You manually click:
#
# GitHub → Actions → Run workflow
#
# ============================================================

on:
  workflow_dispatch:


# ============================================================
# JOBS
# ============================================================

jobs:

  docker-build-push:

    name: 🐳 Build and Push Docker Image

    runs-on: ubuntu-latest


    steps:


      # ======================================================
      # 📥 CHECKOUT SOURCE CODE
      # ======================================================
      #
      # Downloads your repository code into GitHub runner.
      #
      # Docker build needs this source code.
      #
      # ======================================================

      - name: 📥 Checkout Repository
        uses: actions/checkout@v4



      # ======================================================
      # 🔐 LOGIN TO DOCKER HUB
      # ======================================================
      #
      # Uses GitHub Repository Secrets:
      #
      # DOCKERHUB_USERNAME
      # DOCKERHUB_TOKEN
      #
      # Never hardcode Docker credentials.
      #
      # ======================================================

      - name: 🔐 Docker Hub Login

        uses: docker/login-action@v3

        with:

          username: ${{ secrets.DOCKERHUB_USERNAME }}

          password: ${{ secrets.DOCKERHUB_TOKEN }}




      # ======================================================
      # 🧾 SHOW IMAGE INFORMATION
      # ======================================================
      #
      # Docker image naming rule:
      #
      # ✅ Correct:
      # flask-website-service
      #
      # ❌ Wrong:
      # Flask-Website-Service
      #
      # Docker repositories MUST be lowercase.
      #
      # ======================================================

      - name: 🧾 Image Information

        run: |

          echo "=============================================="

          echo "🚀 Starting Docker Image Build"

          echo ""

          echo "Docker Image:"
          
          echo "${{ secrets.DOCKERHUB_USERNAME }}/flask-website-service:latest"

          echo ""

          echo "Build Time:"
          
          date

          echo "=============================================="




      # ======================================================
      # 🐳 BUILD DOCKER IMAGE
      # ======================================================
      #
      # Creates Docker image locally inside GitHub runner.
      #
      # Image format:
      #
      # username/repository:tag
      #
      # Example:
      #
      # pythoncodelife/flask-website-service:latest
      #
      # ======================================================

      - name: 🐳 Build Docker Image

        run: |

          docker build \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/flask-website-service:latest .




      # ======================================================
      # 📤 PUSH IMAGE TO DOCKER HUB
      # ======================================================
      #
      # Uploads the image to Docker Hub.
      #
      # After this step:
      #
      # Docker Hub will contain:
      #
      # username/flask-website-service:latest
      #
      # ======================================================

      - name: 📤 Push Docker Image

        run: |

          docker push \
          ${{ secrets.DOCKERHUB_USERNAME }}/flask-website-service:latest




      # ======================================================
      # ✅ SUCCESS MESSAGE
      # ======================================================

      - name: ✅ Docker Push Completed

        run: |

          echo "================================================"

          echo "✅ Docker Image Successfully Uploaded"

          echo ""

          echo "Image:"
          
          echo "${{ secrets.DOCKERHUB_USERNAME }}/flask-website-service:latest"

          echo ""

          echo "Ready for Render Deployment 🚀"

          echo "================================================"