# ============================================================
# 🚀 CD PIPELINE - FLASK WEBSITE SERVICE
#
# Deployment Strategy:
#
# CD DOES NOT RUN ON TAG PUSH.
#
# CI gives deployment permission after Docker image is ready.
#
#
# Trigger sources:
#
#       ✅ CI repository dispatch
#       ✅ Daily verification
#       ✅ Manual execution
#
#
# Deployment:
#
#       v1.0.5
#
#       If failed:
#
#       v1.0.4
#
#       If failed:
#
#       v1.0.3
#
#
# Automatic rollback behaviour.
#
# ============================================================


name: 🚀 CD Flask Website Deployment





# ============================================================
# EVENTS
# ============================================================


on:


  # ----------------------------------------------------------
  # Triggered only by successful CI
  #
  # CI completes:
  #
  #       Docker build
  #       Docker push
  #
  # Then CD starts.
  #
  # ----------------------------------------------------------

  repository_dispatch:


    types:


      - deploy-release






  # ----------------------------------------------------------
  # Daily deployment verification
  #
  # Runs every day at 04:00 UTC
  #
  # ----------------------------------------------------------

  schedule:


    - cron: "0 4 * * *"






  # ----------------------------------------------------------
  # Manual deployment
  #
  # GitHub Actions
  #       |
  #       ↓
  # Run workflow
  #
  # ----------------------------------------------------------

  workflow_dispatch:








# ============================================================
# JOBS
# ============================================================


jobs:




  # ==========================================================
  # 🚀 DEPLOY JOB
  # ==========================================================


  deploy:


    name: 🚀 Deploy With Automatic Rollback


    runs-on: ubuntu-latest






    steps:





      # ------------------------------------------------------
      # Checkout repository
      # ------------------------------------------------------

      - name: 📥 Checkout Repository


        uses: actions/checkout@v4







      # ------------------------------------------------------
      # Get version from CI payload
      #
      # Example:
      #
      # v1.0.15
      #
      # ------------------------------------------------------

      - name: 🏷️ Get Deployment Version


        run: |


          echo "VERSION=${{ github.event.client_payload.version }}" >> $GITHUB_ENV







      # ------------------------------------------------------
      # Deployment safety hold
      #
      # Gives time before production deployment.
      #
      # ------------------------------------------------------

      - name: ⏳ Deployment Safety Hold


        run: |


          echo "Holding deployment before production..."


          sleep 120







      # ------------------------------------------------------
      # Deploy Application
      #
      # Calls Render deployment webhook.
      #
      # Sends Docker version tag.
      #
      # ------------------------------------------------------

      - name: 🚀 Deploy Application


        run: |


          echo "Deploying version: ${VERSION}"


          curl -X POST \
          -H "Content-Type: application/json" \
          -d "{\"tag\":\"${VERSION}\"}" \
          "${{ secrets.RENDER_DEPLOY_HOOK }}"








      # ------------------------------------------------------
      # Deployment summary
      # ------------------------------------------------------

      - name: 📋 Deployment Summary


        run: |


          echo "================================="

          echo "🚀 Deployment Completed"

          echo ""


          echo "Repository:"

          echo "${{ github.repository }}"


          echo ""


          echo "Version:"

          echo "${VERSION}"


          echo ""


          echo "Trigger:"

          echo "${{ github.event_name }}"


          echo ""


          echo "================================="