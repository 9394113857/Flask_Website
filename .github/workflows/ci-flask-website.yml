# ============================================================
# 🚀 CI PIPELINE - FLASK WEBSITE SERVICE
#
# Workflow:
#
# Normal push:
#       ✅ Install dependencies
#       ✅ Run tests
#
# Pull Request:
#       ✅ Install dependencies
#       ✅ Run tests
#
# Version tag:
#
#       v1.0.0
#       v1.0.1
#
#       ✅ Run tests
#       ✅ Generate build metadata
#       ✅ Build Docker image
#       ✅ Push version image
#       ✅ Push latest image
#       ✅ Wait for registry sync
#       ✅ Trigger CD deployment
#
# Docker push NEVER happens on normal commits.
#
# CD starts ONLY after CI completes successfully.
#
# ============================================================


name: 🚀 CI Flask Website Service



# ============================================================
# EVENTS
# ============================================================


on:


  push:


    branches:


      - "**"


    tags:


      - "v*"




  pull_request:




  workflow_dispatch:





# ============================================================
# JOBS
# ============================================================


jobs:



  # ==========================================================
  # 🧪 TEST JOB
  # ==========================================================


  test:


    name: 🧪 Application Tests


    runs-on: ubuntu-latest



    steps:



      - name: 📥 Checkout Repository

        uses: actions/checkout@v4

        with:

          fetch-depth: 0

          fetch-tags: true





      - name: 🐍 Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.11"





      - name: 📦 Install Dependencies

        run: |


          python -m pip install --upgrade pip


          pip install -r requirements.txt


          pip install pytest





      - name: 🔍 Show Project Structure

        run: |


          pwd

          ls -la

          find . -maxdepth 2 -type d





      - name: 🧪 Run Tests

        env:

          PYTHONPATH: .

        run: |


          pytest -v







  # ==========================================================
  # 🐳 DOCKER RELEASE JOB
  # ==========================================================


  docker-release:


    name: 🐳 Build And Push Docker Image


    needs: test


    if: startsWith(github.ref, 'refs/tags/v')


    runs-on: ubuntu-latest





    steps:



      - name: 📥 Checkout Repository

        uses: actions/checkout@v4

        with:

          fetch-depth: 0

          fetch-tags: true





      - name: 🔐 Docker Hub Login

        uses: docker/login-action@v3

        with:

          username: ${{ secrets.DOCKERHUB_USERNAME }}

          password: ${{ secrets.DOCKERHUB_TOKEN }}







      - name: 🏷️ Set Build Metadata

        run: |


          echo "COMMIT=${GITHUB_SHA}" >> $GITHUB_ENV


          echo "BRANCH=main" >> $GITHUB_ENV


          echo "BUILD_TIME_UTC=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV


          echo "BUILD_TIME_IST=$(TZ='Asia/Kolkata' date +'%Y-%m-%d %H:%M:%S IST')" >> $GITHUB_ENV


          echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV






      - name: 📄 Generate Build Info

        run: |


          cat > build_info.json << EOF

          {

            "version": "${VERSION}",

            "commit": "${COMMIT}",

            "branch": "${BRANCH}",

            "build_time_utc": "${BUILD_TIME_UTC}",

            "build_time_ist": "${BUILD_TIME_IST}"

          }

          EOF






      - name: 🐳 Build Docker Image

        run: |


          docker build -t pythoncodelife/flask-website-service:${VERSION} .







      - name: 📤 Push Version Image

        run: |


          docker push pythoncodelife/flask-website-service:${VERSION}







      - name: 🏷️ Create Latest Tag

        run: |


          docker tag pythoncodelife/flask-website-service:${VERSION} pythoncodelife/flask-website-service:latest







      - name: 📤 Push Latest Image

        run: |


          docker push pythoncodelife/flask-website-service:latest







      # ------------------------------------------------------
      # Docker registry sync wait
      #
      # Wait before allowing CD.
      #
      # ------------------------------------------------------

      - name: ⏳ Wait For Docker Registry Sync

        run: |


          echo "Waiting for Docker registry synchronization..."

          sleep 120







      # ------------------------------------------------------
      # Trigger CD
      #
      # IMPORTANT:
      #
      # Uses personal token because GITHUB_TOKEN
      # cannot trigger repository_dispatch.
      #
      # ------------------------------------------------------

      - name: 🚀 Trigger CD Deployment

        uses: peter-evans/repository-dispatch@v3

        with:


          token: ${{ secrets.CD_TRIGGER_TOKEN }}


          repository: ${{ github.repository }}


          event-type: deploy-release


          client-payload: |


            {

              "version": "${{ env.VERSION }}"

            }