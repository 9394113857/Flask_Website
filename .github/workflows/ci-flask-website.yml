# ============================================================
# 🚀 CI PIPELINE - FLASK WEBSITE SERVICE
#
# Workflow:
#
# Every push:
#       ✅ Install dependencies
#       ✅ Run tests
#
# Pull Request:
#       ✅ Install dependencies
#       ✅ Run tests
#
# Version Tag:
#       ✅ Run tests
#       ✅ Build Docker image
#       ✅ Push Docker image
#
# Docker push happens ONLY for:
#
#       v1.0.0
#       v1.0.1
#       v2.0.0
#
# Normal commits never push Docker.
#
# ============================================================


name: 🚀 CI Flask Website Service




on:


  # ----------------------------------------------------------
  # All branch pushes
  # ----------------------------------------------------------

  push:


    branches:

      - "**"



    tags:

      - "v*"




  # ----------------------------------------------------------
  # Pull requests
  # ----------------------------------------------------------

  pull_request:




  # ----------------------------------------------------------
  # Manual execution
  # ----------------------------------------------------------

  workflow_dispatch:





jobs:





# ============================================================
# 🧪 TEST JOB
#
# Runs always
#
# ============================================================


  test:


    name: 🧪 Application Tests


    runs-on: ubuntu-latest




    steps:




      # ------------------------------------------------------
      # Checkout
      # ------------------------------------------------------

      - name: 📥 Checkout Repository

        uses: actions/checkout@v4





      # ------------------------------------------------------
      # Python setup
      # ------------------------------------------------------

      - name: 🐍 Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.11"





      # ------------------------------------------------------
      # Install packages
      # ------------------------------------------------------

      - name: 📦 Install Dependencies

        run: |


          python -m pip install --upgrade pip


          pip install -r requirements.txt


          pip install pytest





      # ------------------------------------------------------
      # Show structure
      #
      # Helps debugging import issues
      #
      # ------------------------------------------------------

      - name: 🔍 Project Structure

        run: |


          pwd

          ls -la

          find . -maxdepth 2 -type d





      # ------------------------------------------------------
      # Run tests
      #
      # PYTHONPATH tells Python where app package exists
      #
      # ------------------------------------------------------

      - name: 🧪 Run Tests

        env:


          PYTHONPATH: .


        run: |


          pytest -v





# ============================================================
# 🐳 DOCKER RELEASE JOB
#
# Runs ONLY when version tag created
#
# Example:
#
# git tag v1.0.0
#
# ============================================================


  docker-release:


    name: 🐳 Build And Push Docker Image


    needs: test


    if: startsWith(github.ref, 'refs/tags/v')


    runs-on: ubuntu-latest





    steps:



      - name: 📥 Checkout Repository

        uses: actions/checkout@v4





      - name: 🔐 Docker Hub Login

        uses: docker/login-action@v3

        with:


          username: ${{ secrets.DOCKERHUB_USERNAME }}


          password: ${{ secrets.DOCKERHUB_TOKEN }}






      # ------------------------------------------------------
      # Extract tag version
      #
      # Example:
      #
      # refs/tags/v1.0.0
      #
      # becomes:
      #
      # v1.0.0
      #
      # ------------------------------------------------------

      - name: 🏷️ Get Version

        run: |


          VERSION=${GITHUB_REF#refs/tags/}


          echo "VERSION=$VERSION" >> $GITHUB_ENV






      - name: 🐳 Build Docker Image

        run: |


          docker build \

          -t pythoncodelife/flask-website-service:${VERSION} .






      - name: 📤 Push Version Image

        run: |


          docker push \

          pythoncodelife/flask-website-service:${VERSION}






      # ------------------------------------------------------
      # Update latest
      #
      # latest always points to newest release
      #
      # ------------------------------------------------------

      - name: 🏷️ Create Latest Tag

        run: |


          docker tag \

          pythoncodelife/flask-website-service:${VERSION} \

          pythoncodelife/flask-website-service:latest






      - name: 📤 Push Latest Image

        run: |


          docker push \

          pythoncodelife/flask-website-service:latest