<!-- ========================================================= -->
<!-- Division -->
<!-- ========================================================= -->

<div class="card mt-4 shadow-sm">

    <div class="card-header bg-info text-dark">

        <h5 class="mb-0">

            Division

        </h5>

    </div>

    <div class="card-body">

        <form method="POST">


            <!-- ============================================== -->
            <!-- First Number -->
            <!-- ============================================== -->

            <div class="mb-3">

                <label class="form-label">

                    First Number

                </label>

                <input
                    type="number"
                    step="any"
                    class="form-control"
                    name="div_number1"
                    placeholder="Enter First Number"
                    value="{{ div_number1 if div_number1 is defined else '' }}"
                    required>

            </div>


            <!-- ============================================== -->
            <!-- Second Number -->
            <!-- ============================================== -->

            <div class="mb-3">

                <label class="form-label">

                    Second Number

                </label>

                <input
                    type="number"
                    step="any"
                    class="form-control"
                    name="div_number2"
                    placeholder="Enter Second Number"
                    value="{{ div_number2 if div_number2 is defined else '' }}"
                    required>

            </div>


            <!-- ============================================== -->
            <!-- Submit Button -->
            <!-- ============================================== -->

            <div class="d-grid">

                <button
                    type="submit"
                    name="operation"
                    value="divide"
                    class="btn btn-info">

                    Divide Numbers

                </button>

            </div>


        </form>


        <!-- ============================================== -->
        <!-- Result -->
        <!-- ============================================== -->

        {% if division_result is not none %}

        <div class="alert alert-success mt-4">

            <h5 class="text-center mb-0">

                Result : {{ division_result }}

            </h5>

        </div>

        {% endif %}


        <!-- ============================================== -->
        <!-- Error -->
        <!-- ============================================== -->

        {% if division_error is defined and division_error %}

        <div class="alert alert-danger mt-4">

            <h5 class="text-center mb-0">

                {{ division_error }}

            </h5>

        </div>

        {% endif %}


    </div>

</div>
