<!-- ========================================================= -->
<!-- Multiplication -->
<!-- ========================================================= -->

<div class="card mt-4 shadow-sm">

    <div class="card-header bg-warning text-dark">

        <h5 class="mb-0">

            Multiplication

        </h5>

    </div>

    <div class="card-body">

        <form method="POST">


            <!-- ============================================== -->
            <!-- First Number -->
            <!-- ============================================== -->

            <div class="mb-3">

                <label class="form-label">

                    First Number

                </label>

                <input
                    type="number"
                    step="any"
                    class="form-control"
                    name="mul_number1"
                    placeholder="Enter First Number"
                    value="{{ mul_number1 if mul_number1 is defined else '' }}"
                    required>

            </div>


            <!-- ============================================== -->
            <!-- Second Number -->
            <!-- ============================================== -->

            <div class="mb-3">

                <label class="form-label">

                    Second Number

                </label>

                <input
                    type="number"
                    step="any"
                    class="form-control"
                    name="mul_number2"
                    placeholder="Enter Second Number"
                    value="{{ mul_number2 if mul_number2 is defined else '' }}"
                    required>

            </div>


            <!-- ============================================== -->
            <!-- Submit Button -->
            <!-- ============================================== -->

            <div class="d-grid">

                <button
                    type="submit"
                    name="operation"
                    value="multiply"
                    class="btn btn-warning">

                    Multiply Numbers

                </button>

            </div>


        </form>


        <!-- ============================================== -->
        <!-- Result -->
        <!-- ============================================== -->

        {% if multiplication_result is not none %}

        <div class="alert alert-success mt-4">

            <h5 class="text-center mb-0">

                Result : {{ multiplication_result }}

            </h5>

        </div>

        {% endif %}


        <!-- ============================================== -->
        <!-- Error -->
        <!-- ============================================== -->

        {% if multiplication_error is defined and multiplication_error %}

        <div class="alert alert-danger mt-4">

            <h5 class="text-center mb-0">

                {{ multiplication_error }}

            </h5>

        </div>

        {% endif %}


    </div>

</div>
