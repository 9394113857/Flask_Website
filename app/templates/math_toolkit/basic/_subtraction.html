<!-- ========================================================= -->
<!-- Subtraction -->
<!-- ========================================================= -->

<div class="card mt-4 shadow-sm">

    <div class="card-header bg-danger text-white">

        <h5 class="mb-0">

            Subtraction

        </h5>

    </div>

    <div class="card-body">

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">

                    First Number

                </label>

                <input
                    type="number"
                    step="any"
                    class="form-control"
                    name="sub_number1"
                    placeholder="Enter First Number"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Second Number

                </label>

                <input
                    type="number"
                    step="any"
                    class="form-control"
                    name="sub_number2"
                    placeholder="Enter Second Number"
                    required>

            </div>

            <div class="d-grid">

                <button
                    type="submit"
                    name="operation"
                    value="subtract"
                    class="btn btn-danger">

                    Subtract Numbers

                </button>

            </div>

        </form>

    </div>

</div>
