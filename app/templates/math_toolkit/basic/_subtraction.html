<!-- ========================================================= -->
<!-- Subtraction -->
<!-- ========================================================= -->

<div class="card mt-4 shadow-sm">

    <div class="card-header bg-danger text-white">

        <h5 class="mb-0">

            Subtraction

        </h5>

    </div>

    <div class="card-body">

        <form method="POST">


            <!-- ============================================== -->
            <!-- First Number -->
            <!-- ============================================== -->

            <div class="mb-3">

                <label class="form-label">

                    First Number

                </label>

                <input
                    type="number"
                    step="any"
                    class="form-control"
                    name="sub_number1"
                    placeholder="Enter First Number"
                    value="{{ sub_number1 if sub_number1 is defined else '' }}"
                    required>

            </div>


            <!-- ============================================== -->
            <!-- Second Number -->
            <!-- ============================================== -->

            <div class="mb-3">

                <label class="form-label">

                    Second Number

                </label>

                <input
                    type="number"
                    step="any"
                    class="form-control"
                    name="sub_number2"
                    placeholder="Enter Second Number"
                    value="{{ sub_number2 if sub_number2 is defined else '' }}"
                    required>

            </div>


            <!-- ============================================== -->
            <!-- Submit Button -->
            <!-- ============================================== -->

            <div class="d-grid">

                <button
                    type="submit"
                    name="operation"
                    value="subtract"
                    class="btn btn-danger">

                    Subtract Numbers

                </button>

            </div>


        </form>


        <!-- ============================================== -->
        <!-- Result -->
        <!-- ============================================== -->

        {% if subtraction_result is not none %}

        <div class="alert alert-success mt-4">

            <h5 class="text-center mb-0">

                Result : {{ subtraction_result }}

            </h5>

        </div>

        {% endif %}


        <!-- ============================================== -->
        <!-- Error -->
        <!-- ============================================== -->

        {% if subtraction_error is defined and subtraction_error %}

        <div class="alert alert-danger mt-4">

            <h5 class="text-center mb-0">

                {{ subtraction_error }}

            </h5>

        </div>

        {% endif %}


    </div>

</div>
