{% extends "base.html" %}

{% block title %}
Math Toolkit
{% endblock %}

{% block content %}

<div class="container">

    <!-- ========================================================= -->
    <!-- Page Header -->
    <!-- ========================================================= -->

    <div class="text-center mb-5">

        <h1 class="fw-bold">

            {{ page_data.title }}

        </h1>

        <p class="lead text-muted">

            {{ page_data.description }}

        </p>

    </div>

    <!-- ========================================================= -->
    <!-- Bootstrap Navigation Pills -->
    <!-- ========================================================= -->

    <ul
        class="nav nav-pills justify-content-center mb-4"
        id="mathToolkitTabs"
        role="tablist">

        <!-- ===================================================== -->
        <!-- Basic -->
        <!-- ===================================================== -->

        <li
            class="nav-item mx-2"
            role="presentation">

            <button
                class="nav-link active"
                id="basic-tab"
                data-bs-toggle="pill"
                data-bs-target="#basic"
                type="button"
                role="tab">

                Basic

            </button>

        </li>

        <!-- ===================================================== -->
        <!-- Numbers -->
        <!-- ===================================================== -->

        <li
            class="nav-item mx-2"
            role="presentation">

            <button
                class="nav-link"
                id="numbers-tab"
                data-bs-toggle="pill"
                data-bs-target="#numbers"
                type="button"
                role="tab">

                Numbers

            </button>

        </li>

        <!-- ===================================================== -->
        <!-- Range -->
        <!-- ===================================================== -->

        <li
            class="nav-item mx-2"
            role="presentation">

            <button
                class="nav-link"
                id="range-tab"
                data-bs-toggle="pill"
                data-bs-target="#range"
                type="button"
                role="tab">

                Range

            </button>

        </li>

    </ul>

    <!-- ========================================================= -->
    <!-- Tab Content -->
    <!-- ========================================================= -->

    <div class="tab-content">

        <!-- ===================================================== -->
        <!-- Basic -->
        <!-- ===================================================== -->

        <div
            class="tab-pane fade show active"
            id="basic"
            role="tabpanel">

            {% include "math_toolkit/_basic.html" %}

        </div>

        <!-- ===================================================== -->
        <!-- Numbers -->
        <!-- ===================================================== -->

        <div
            class="tab-pane fade"
            id="numbers"
            role="tabpanel">

            {% include "math_toolkit/_numbers.html" %}

        </div>

        <!-- ===================================================== -->
        <!-- Range -->
        <!-- ===================================================== -->

        <div
            class="tab-pane fade"
            id="range"
            role="tabpanel">

            {% include "math_toolkit/_range.html" %}

        </div>

    </div>

</div>

{% endblock %}
