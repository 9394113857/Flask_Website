<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Mobile Responsive -->
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <!-- Page Title -->
    <title>
        {% block title %}
        Flask Website
        {% endblock %}
    </title>

    <!-- Bootstrap CSS -->
    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <!-- Custom CSS -->
    <link
    rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>


<!-- ================= NAVBAR ================= -->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

    <div class="container">

        <a class="navbar-brand"
           href="{{ url_for('home.home') }}">

            Flask Website

        </a>

        <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div
        class="collapse navbar-collapse"
        id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">

                    <a class="nav-link"
                       href="{{ url_for('home.home') }}">

                        Home

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/calculator">

                        Calculator

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/bmi">

                        BMI

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/flames">

                        FLAMES

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/guess">

                        Guess

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/about">

                        About

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/contact">

                        Contact

                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>


<!-- ================= PAGE CONTENT ================= -->

<div class="container mt-5 mb-5">

    {% block content %}

    {% endblock %}

</div>


<!-- ================= FOOTER ================= -->

<footer
class="bg-dark text-white text-center p-3">

    © 2026 Flask Website

</footer>


<!-- Bootstrap JS -->

<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">

</script>

</body>

</html>
