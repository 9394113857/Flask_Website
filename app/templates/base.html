<!DOCTYPE html>
<html lang="en">

<head>

    <!-- ========================================================= -->
    <!-- Character Encoding -->
    <!-- ========================================================= -->
    <meta charset="UTF-8">

    <!-- ========================================================= -->
    <!-- Mobile Responsive -->
    <!-- ========================================================= -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ========================================================= -->
    <!-- Page Title -->
    <!-- Child templates can override this block -->
    <!-- ========================================================= -->
    <title>
        {% block title %}
        Flask Website
        {% endblock %}
    </title>

    <!-- ========================================================= -->
    <!-- Bootstrap 5 CSS -->
    <!-- ========================================================= -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ========================================================= -->
    <!-- Custom Stylesheet -->
    <!-- ========================================================= -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- ========================================================= -->
    <!-- Website Favicon -->
    <!-- ========================================================= -->
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/lab_flask_test_tube.ico') }}">

</head>

<body>

    <!-- ========================================================= -->
    <!-- Navigation Bar -->
    <!-- sticky-top  : Keeps navbar visible while scrolling -->
    <!-- shadow-sm   : Adds a subtle Bootstrap shadow -->
    <!-- ========================================================= -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow-sm">

        <div class="container">

            <!-- ================= Brand ================= -->

            <a class="navbar-brand fw-bold" href="{{ url_for('home.home') }}">

                🧪 Flask Website

            </a>

            <!-- ================= Mobile Menu Button ================= -->

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">

                <span class="navbar-toggler-icon"></span>

            </button>

            <!-- ================= Navigation Links ================= -->

            <div class="collapse navbar-collapse" id="navbarNav">

                <!--
                    ms-auto     : Push menu to the right
                    mx-lg-2     : Better spacing between menu items
                -->

                <ul class="navbar-nav ms-auto align-items-lg-center">

                    <!-- Home -->

                    <li class="nav-item mx-lg-2">

                        <a class="nav-link" href="{{ url_for('home.home') }}">

                            Home

                        </a>

                    </li>

                    <!-- Calculator -->

                    <li class="nav-item mx-lg-2">

                        <a class="nav-link" href="{{ url_for('calculator.calculator') }}">

                            Calculator

                        </a>

                    </li>

                    <!-- BMI -->

                    <li class="nav-item mx-lg-2">

                        <a class="nav-link" href="{{ url_for('bmi.bmi') }}">

                            BMI

                        </a>

                    </li>

                    <!-- FLAMES -->

                    <li class="nav-item mx-lg-2">

                        <a class="nav-link" href="{{ url_for('flames.flames') }}">

                            FLAMES

                        </a>

                    </li>

                    <!-- Guess Game -->

                    <li class="nav-item mx-lg-2">

                        <a class="nav-link" href="{{ url_for('guess.guess') }}">

                            Guess

                        </a>

                    </li>

                    <!-- ========================================================= -->
                    <!-- Math Toolkit -->
                    <!-- Added in: feature/math-toolkit -->
                    <!-- ========================================================= -->

                    <li class="nav-item mx-lg-2">

                        <a class="nav-link" href="{{ url_for('math_toolkit.math_toolkit') }}">

                            Math Toolkit

                        </a>

                    </li>

                    <!-- About -->

                    <li class="nav-item mx-lg-2">

                        <a class="nav-link" href="{{ url_for('about.about') }}">

                            About

                        </a>

                    </li>

                    <!-- Contact -->

                    <li class="nav-item mx-lg-2">

                        <a class="nav-link" href="{{ url_for('contact.contact') }}">

                            Contact

                        </a>

                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- ========================================================= -->
    <!-- Main Page Content -->
    <!-- Child templates inject their content here -->
    <!-- py-5 provides balanced top and bottom spacing -->
    <!-- ========================================================= -->

    <main class="container py-5">

        {% block content %}

        {% endblock %}

    </main>

    <!-- ========================================================= -->
    <!-- Footer -->
    <!-- ========================================================= -->

    <footer class="bg-dark text-white text-center py-3">

        <div class="container">

            © 2026 Flask Website |
            Built with Python, Flask & Bootstrap 5

        </div>

    </footer>

    <!-- ========================================================= -->
    <!-- Bootstrap JavaScript Bundle -->
    <!-- Includes Popper.js -->
    <!-- ========================================================= -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">

    </script>

</body>

</html>
